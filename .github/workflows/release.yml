name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no git push, no tag, no GitHub release, no Hex publish)"
        required: false
        type: boolean
        default: false
      hex_dry_run:
        description: "Hex dry run only (run all git/release steps, but skip actual Hex publish)"
        required: false
        type: boolean
        default: false
      version_override:
        description: "Optional explicit release version (use 2.0.0 for the first 2.0 release)"
        required: false
        type: string
        default: ""
      skip_tests:
        description: "Skip tests before release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    name: Release
    uses: agentjido/github-actions/.github/workflows/elixir-release.yml@v3
    with:
      dry_run: ${{ inputs.dry_run }}
      hex_dry_run: ${{ inputs.hex_dry_run }}
      version_override: ${{ inputs.version_override }}
      skip_tests: ${{ inputs.skip_tests }}
    secrets: inherit
