name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changelog-guard:
    name: Lint / Changelog Guard
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    permissions:
      pull-requests: read
      contents: read
    steps:
      - name: Check for CHANGELOG.md modifications
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          FILES=$(gh api --paginate repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files --jq '.[].filename')
          if echo "$FILES" | grep -qE '^CHANGELOG\.md$'; then
            echo "::error::CHANGELOG.md should not be edited manually - it is auto-generated by git_ops during releases."
            echo ""
            echo "Please remove CHANGELOG.md from your PR. Your changes will appear in the changelog"
            echo "automatically based on your conventional commit messages:"
            echo "  - feat: commits create 'Added' entries"
            echo "  - fix: commits create 'Fixed' entries"
            echo "  - docs:, chore:, ci: commits are excluded"
            exit 1
          fi
          echo "✓ No CHANGELOG.md modifications detected"

  lint:
    name: Lint / Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      MIX_ENV: dev
      PLT_CACHE_VERSION: v2
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19"

      - name: Restore Hex/Mix cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.hex
            ~/.mix
          key: ${{ runner.os }}-beamtools-otp28-elixir1.19-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-beamtools-otp28-elixir1.19-

      - name: Install Hex/Rebar
        run: |
          set -euo pipefail
          mix local.hex --force
          mix local.rebar --force

      - name: Restore dependencies cache
        uses: actions/cache@v4
        id: deps-cache
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-dev-otp28-elixir1.19-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-dev-otp28-elixir1.19-

      - name: Remove cached rebar3 build artifacts in deps
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: |
          if [ -d deps ]; then
            find deps -maxdepth 6 -type d \( -name _build -o -name .rebar3 \) -prune -exec rm -rf {} + || true
            find deps -maxdepth 6 -type f -name rebar3.crashdump -delete || true
          fi

      - name: Install dependencies
        run: mix deps.get

      - name: Compile dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: mix deps.compile
        env:
          MIX_ENV: ${{ env.MIX_ENV }}

      - name: Create PLT directory
        run: mkdir -p priv/plts

      - name: Restore Dialyzer PLT cache
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: ${{ runner.os }}-plt-${{ env.PLT_CACHE_VERSION }}-otp28-elixir1.19-${{ hashFiles('mix.lock', 'mix.exs', '.github/workflows/ci.yml') }}

      - name: Ensure Dialyzer PLT is current
        run: mix dialyzer --plt
        env:
          MIX_ENV: ${{ env.MIX_ENV }}

      - name: Run lint checks
        run: mix quality
        env:
          MIX_ENV: ${{ env.MIX_ENV }}

      - name: Check for unused dependencies
        run: mix deps.unlock --check-unused

      - name: Audit Hex dependencies
        run: mix hex.audit

      - name: Validate Hex package (dry run)
        if: github.event_name == 'pull_request'
        run: mix hex.publish --dry-run
        env:
          MIX_ENV: dev
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}

  test:
    name: Test
    uses: agentjido/github-actions/.github/workflows/elixir-test.yml@main
    with:
      otp_versions: '["27", "28"]'
      elixir_versions: '["1.18", "1.19"]'
      test_command: mix test

  integration:
    name: Integration / Elixir 1.19
    runs-on: macos-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      MIX_ENV: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19"

      - name: Restore Hex/Mix cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.hex
            ~/.mix
          key: ${{ runner.os }}-beamtools-otp28-elixir1.19-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-beamtools-otp28-elixir1.19-

      - name: Install Hex/Rebar
        run: |
          set -euo pipefail
          mix local.hex --force
          mix local.rebar --force

      - name: Restore dependencies cache
        uses: actions/cache@v4
        id: deps-cache
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-test-otp28-elixir1.19-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-test-otp28-elixir1.19-

      - name: Remove cached rebar3 build artifacts in deps
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: |
          if [ -d deps ]; then
            find deps -maxdepth 6 -type d \( -name _build -o -name .rebar3 \) -prune -exec rm -rf {} + || true
            find deps -maxdepth 6 -type f -name rebar3.crashdump -delete || true
          fi

      - name: Install dependencies
        run: mix deps.get

      - name: Compile dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: mix deps.compile

      - name: Compile project
        run: mix compile --warnings-as-errors

      - name: Clear cached browser install
        run: rm -rf _build/jido_browser-*

      - name: Install browser binaries
        run: mix jido_browser.install agent_browser vibium web --force

      - name: Run integration tests
        run: mix test --include integration
